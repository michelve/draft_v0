name: Dependency Review

on:
  pull_request:
    branches: [main]
    paths:
      - package.json
      - pnpm-lock.yaml

jobs:
  dependency-review:
    name: Scan for vulnerabilities
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
