name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    ci:
        name: Quality Gates & Tests
        runs-on: ubuntu-latest

        env:
            DATABASE_URL: file:./dev.db
            NODE_ENV: test

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Generate Prisma client
              run: pnpm db:generate

            - name: Typecheck
              run: pnpm typecheck

            - name: Biome
              run: pnpm biome:check

            - name: Lint
              run: pnpm lint

            - name: Build
              run: pnpm build

            - name: Push database schema
              run: pnpm db:push

            - name: Unit tests
              run: pnpm test -- --run
